<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAWN WARS | RL AI Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top right, #1e293b, #0f172a 70%);
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.4);
      --surface: rgba(30, 41, 59, 0.7);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-gradient);
      font-family: 'Inter', sans-serif;
      color: #f8fafc;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 4rem 5rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 4.5rem;
      margin: 0;
      background: linear-gradient(135deg, #e0f2fe, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-top: 0.5rem;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .play-btn {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      text-decoration: none;
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--accent-glow);
      display: inline-block;
    }

    .play-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <h1>PAWN WARS</h1>
    <p>Matchbox Educable Reinforcement Game Engine<br><strong>3x3 Hexapawn RL Agent</strong></p>
    <a href="/play" class="play-btn">Initialize Match</a>
  </div>
</body>

</html>
